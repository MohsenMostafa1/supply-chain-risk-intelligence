name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      zookeeper:
        image: confluentinc/cp-zookeeper:latest
        ports:
          - 2181:2181
        env:
          ZOOKEEPER_CLIENT_PORT: 2181
      kafka:
        image: confluentinc/cp-kafka:latest
        ports:
          - 9092:9092
        env:
          KAFKA_BROKER_ID: 1
          KAFKA_ZOOKEEPER_CONNECT: localhost:2181
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://127.0.0.1:9092
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      postgres:
        image: postgres:14
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: orion
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run unit tests
      run: |
        PYTHONPATH=. pytest tests/unit/ -v --cov=processing --cov=data --cov-report=xml
      env:
        PYTHONPATH: .

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    # -----------------------------------------
    # Debugging: check if Kafka container is running
    # -----------------------------------------
    - name: Check Kafka container status
      run: |
        echo "Listing all containers:"
        docker ps -a
        echo "Kafka container logs:"
        docker logs $(docker ps -aq --filter ancestor=confluentinc/cp-kafka:latest) || true
      if: always()

    # -----------------------------------------
    # Wait for Kafka port to be open (using nc)
    # -----------------------------------------
    - name: Wait for Kafka port to be open
      run: |
        echo "Waiting for Kafka port 9092..."
        timeout=120
        start=$(date +%s)
        while true; do
          if nc -z 127.0.0.1 9092 2>/dev/null; then
            echo "Kafka port open. Waiting extra 10 seconds for broker stability..."
            sleep 10
            break
          fi
          now=$(date +%s)
          if [ $((now - start)) -ge $timeout ]; then
            echo "Timeout after ${timeout} seconds. Kafka never became ready."
            exit 1
          fi
          echo "Port 9092 not ready, retrying in 2 seconds..."
          sleep 2
        done
      if: always()

    - name: Create Kafka topic
      run: |
        docker run --rm --network host confluentinc/cp-kafka:latest kafka-topics \
          --create --topic iot-sensor-data \
          --bootstrap-server 127.0.0.1:9092 \
          --partitions 1 --replication-factor 1 || true
      if: always()

    - name: Run integration tests
      run: |
        PYTHONPATH=. pytest tests/integration/ -v
      env:
        PYTHONPATH: .
      continue-on-error: true
