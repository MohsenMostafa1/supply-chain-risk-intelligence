global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'kafka'
    static_configs:
      - targets: ['localhost:9092']
  - job_name: 'spark'
    static_configs:
      - targets: ['spark-master:8080']
  - job_name: 'mlflow'
    static_configs:
      - targets: ['mlflow:5000']
  - job_name: 'fastapi'
    static_configs:
      - targets: ['host.docker.internal:8000']
